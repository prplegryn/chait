name: chait
description: A minimal custom AI API chat app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ">=2.1.0 <2.2.0"
  flutter_math_fork: ^0.7.4
  flutter_markdown: ^0.7.7+1
  markdown: ^7.3.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/InterVariable.ttf
